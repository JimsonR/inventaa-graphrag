tenant:
  id: "inventaa"
  name: "Inventaa"
  description: "an Indian LED lighting brand"
  aliases: 
    - "tenant_swadhya_foods_001"
    - "tenant_inventaa_led_001"
  default_warranty: "This product carries {brand_name}'s standard 1-Year replacement warranty. Contact support to claim."

prompts:
  fallback_error_message: "I'm sorry, I'm only able to assist with LED lighting products and related queries from Inventaa."
  broad_query_fallback: "For example, are you looking for Indoor, Outdoor, or Solar lights?"
  
  router_system: >
    You are an intent classification router for {brand_name}, {brand_description}.
    Classify the user's query into exactly ONE of the following intents:
    {intent_descriptions}
    
    If the query does not perfectly match one, select the closest fit. If completely unrelated to lighting or company operations, default to "search".

  judge_system_product: >
    You are a strict product relevance judge for {brand_name}, {brand_description}.
    The user asked: "{{user_query}}"
    
    The product search tool returned the following JSON:
    {{product_search_result}}
    
    Decide if these products genuinely match what the user requested.
    Rules:
    - If the user asked for "indoor" products but ALL results are "outdoor", "exterior", or "gate" products -> REJECT.
    - If the results are completely unrelated product categories -> REJECT.
    - If the JSON is empty [] -> ACCEPT. This is a valid response meaning we do not carry the requested product.
    - If the results are reasonably relevant to the user's query -> ACCEPT.
    
    Output ONLY one of:
    - "VALID" if the results match (or if the JSON is empty [])
    - A short feedback sentence if they do not (e.g. "Results are exterior gate lights but user wants indoor lights. Tell user we don't carry indoor lights.")

  judge_system_qa: >
    You are a lenient QA evaluator for {brand_name}.
    The user asked: "{{user_query}}"
    The agent responded: "{{last_ai_content}}"
    
    Output ONLY "VALID" unless the response has one of these CRITICAL failures:
    - The agent made up information not supported by any tool (hallucinated)
    - The agent said it doesn't know, but the response actually contains the answer
    - The agent gave the WRONG product (completely wrong product name)
    - The response is completely empty or a server error message
    
    DO NOT reject for minor phrasing preferences (e.g. saying "available in 18W" vs "only 18W available").
    DO NOT reject policy, FAQ, or product detail answers that contain the relevant facts.
    If in doubt, output "VALID".

intents:
  search:
    description: >
      - "search" : Browsing, finding, recommending, or filtering products by budget/rating/type.
    tools:
      - "SearchProductsDatabase"
  detail:
    description: >
      - "detail" : Asking for specific specs (wattage, dimensions, warranty, material) of a product, OR asking a follow-up question (like "warranty", "price") about a product recently mentioned in the conversation context.
    tools:
      - "ProductDetailsDatabase"
  policy:
    description: >
      - "policy" : Questions about discounts, offers, deals, coupon codes (e.g. "offers on solar lights"), shipping, delivery, returns, general warranty claims procedure, or bulk pricing/dealer rates.
    tools:
      - "PolicyVectorDatabase"
      - "ProductDetailsDatabase"
      - "GeneralKnowledgeDatabase"
      - "SearchProductsDatabase"
  advice:
    description: >
      - "advice" : Questions about installation, durability (waterproof, coastal, weather), or maintenance (NO named product).
    tools:
      - "ProductAdviceDatabase"
      - "GeneralKnowledgeDatabase"
      - "SearchProductsDatabase"
  knowledge:
    description: >
      - "knowledge" : Educational concepts (what is IP rating/CRI/lumens), comparisons (LED vs solar, warm vs cool), or general buying guides.
    tools:
      - "GeneralKnowledgeDatabase"
      - "ProductAdviceDatabase"
      - "SearchProductsDatabase"

