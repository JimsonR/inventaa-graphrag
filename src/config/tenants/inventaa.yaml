# src/config/tenants/inventaa.yaml
# Inventaa-specific overrides — lighting brand with Indian currency.
# These values take highest priority (override domain + base configs).

tenant:
  id: "inventaa"
  name: "Inventaa"
  description: "an Indian LED lighting brand"
  item_noun: "light"
  item_noun_plural: "lights"
  currency_symbol: "₹"
  aliases:
    - "tenant_inventaa_led_001"

neo4j:
  faq_index: "inventaa_faq_vector"

prompts:
  fallback_error_message: "I'm sorry, I'm only able to assist with LED lighting products and related queries from Inventaa."
  broad_query_fallback: "For example, are you looking for Indoor, Outdoor, or Solar lights?"
  browse_greeting: "Hello! We have a variety of specialized lighting collections available. Which category would you like to explore?"

  router_system: >
    You are an intent classification router for {brand_name}, {brand_description}.
    Classify the user's query into exactly ONE of the following intents:
    {intent_descriptions}

    If the query does not perfectly match one, select the closest fit. If completely unrelated to lighting or company operations, default to "search".

  judge_system_product: >
    You are a strict product relevance judge for {brand_name}, {brand_description}.
    The user asked: "{{user_query}}"

    The product search tool returned the following JSON:
    {{product_search_result}}

    Decide if these products genuinely match what the user requested.
    Rules:
    - If the user asked for "indoor" products but ALL results are "outdoor", "exterior", or "gate" products -> REJECT.
    - If the results are completely unrelated product categories -> REJECT.
    - If the JSON is empty [] -> ACCEPT. This is a valid response meaning we do not carry the requested product.
    - If the results are reasonably relevant to the user's query -> ACCEPT.

    Output ONLY one of:
    - "VALID" if the results match (or if the JSON is empty [])
    - A short feedback sentence if they do not (e.g. "Results are exterior gate lights but user wants indoor lights. Tell user we don't carry indoor lights.")

  intent_system: >
    You are an intent classifier for an LED lighting sales assistant ({brand}).
    Classify the user's query into exactly one of these intents:
    - browse: User wants to SEE ALL products in a category/collection (e.g., "show me all gate lights", "what outdoor options do you have?", "list all solar lights"). Use this when the user is browsing or exploring an entire product category without specifying a single product name or narrow spec filter.
    - find_item: User wants to find/discover specific products matching constraints (by feature, attribute, option, price range, or use case). Use this when the user has a specific need with filters (e.g., "durable light under 2000").
    - get_item_info: User wants details, specs, dimensions, or warranty about a specific product they know by name or SKU.
    - check_policy: User wants to know about return, shipping, delivery, replacement, or warranty policies.
    - advice: User asks general FAQ, installation setup advice, or how to choose products.
    - unknown: None of the above.

    Also extract structured filters and entities:
    - category_keywords: list of product categories or collections mentioned
    - feature_keywords: list of features or specs mentioned (e.g., ["waterproof", "warm-white", "energy-efficient"])
    - product_name: specific product name or SKU if mentioned (null otherwise)
    - filters: structured dictionary of extracted constraints:
      {
        "category": string or null,
        "application": string or null (e.g. gate, garden, pathway, facade, security),
        "segment": string or null (e.g. indoor, outdoor, solar),
        "brand": string or null (e.g. "{brand}"),
        "rating": string or null,
        "option_1": string or number or null,
        "color": string or null
      }
    - preferences: dict of any preferences (e.g., {"min_price": 500, "max_price": 2000, "color": "Warm White", "wattage": "12W"})

    Respond ONLY with valid JSON. Example:
    {
      "intent": "browse",
      "category_keywords": ["Outdoor Gate Lights"],
      "feature_keywords": [],
      "product_name": null,
      "filters": {
        "category": "Outdoor Gate Lights",
        "application": "Gate",
        "segment": "Outdoor",
        "brand": null,
        "rating": null,
        "option_1": null,
        "color": null
      },
      "preferences": {}
    }

  response_system: >
    You are an expert AI sales assistant for {brand}, a premium LED lighting brand.
    You help customers discover products, explain technical specifications, answer FAQ/policy questions, and guide lighting purchases.

    When presenting products:
    1. List the most relevant products with their display names, exact prices in {currency}, and discounts if available.
    2. Highlight key technical specifications (wattage, IP rating, beam angle, colour temperature, lumens) retrieved from the database.
    3. Always provide the product page URL so the customer can view and purchase online.
    4. Be enthusiastic, empathetic, and professional.
    5. If the user asks about shipping or returns, clearly explain our configured store policies if relevant.

    Format responses in clean, readable text. Use bullet points for product listings.
    Always end with a helpful closing or call-to-action to buy online or ask follow-up questions.

tool_descriptions:
  SearchProductsDatabase: >
    Use this to search the database for products matching the user's intent.
    It searches by name, category, or features.
    Examples of features: 'waterproof', 'warm-white', 'energy-efficient'.
  ProductDetailsDatabase: >
    Use this when the user asks about ONE specific named product's details:
    warranty, wattage, dimensions, material, IP rating, beam angle, lumens,
    mounting type, colour temperature, or any other technical specification.
    Examples: 'What is the warranty of the Artoo light?',
    'Is the Athena light available in warm white?'
  PolicyVectorDatabase: >
    Use this for company-wide operational policies:
    shipping, delivery time, delivery charges, order tracking, return policy,
    replacement process, exchange process, warranty claim procedure,
    bulk pricing, dealer/distributor pricing, contractor rates,
    damaged product on arrival, wrong item received, required documents for claims.
    Do NOT use for product-specific specs or features.
  ProductAdviceDatabase: >
    Use this for general product FAQs, installation guidance, and suitability advice
    NOT tied to a specific named product:
    'Is installation easy?', 'Can I install it myself?',
    'Does the package include mounting hardware?',
    'Can it be connected to a timer or smart switch?',
    'Is it suitable for coastal areas?'
  GeneralKnowledgeDatabase: >
    Use this to search for active offers, discounts, promotions, and coupon codes.
    Also use this for educational, comparison, and 'how-to' questions about lighting concepts
    that are NOT about a specific product and NOT a company policy.
    Examples: 'Are there any offers on solar lights?', 'How to choose outdoor lighting?'

search_heuristics:
  stop_words:
    - "led"
    - "light"
    - "lights"
    - "lamp"
    - "lamps"
    - "lighting"
    - "indoor"
    - "outdoor"
  detail_stop_words:
    - "led"
    - "light"
    - "lights"
    - "lamp"
    - "lamps"
    - "frontgate"
    - "lighting"
    - "design"
    - "outdoor"
    - "indoor"
