tenant:
  id: "{TENANT_ID}"
  name: "{TENANT_NAME}"
  domain: "ecommerce"
  description: "{TENANT_DESCRIPTION}"
  # Generic noun for a catalog item in this vertical (light / furniture / dish / appointment / item).
  item_noun: "item"
  # Plural form (lights / furniture pieces / dishes / appointments / items).
  item_noun_plural: "items"
  aliases: []
  default_warranty: "This product carries {brand_name}'s standard warranty. Contact support for details."

neo4j:
  fulltext_index: "{tenant_id}_fulltext_index"
  # Optional: if omitted, resolves to '{tenant_id}_faq_vector' at runtime.

prompts:
  fallback_error_message: "I'm sorry, I can only assist with {item_noun_plural} and related queries from {brand_name}."
  broad_query_fallback: "For example, are you looking for something specific?"
  browse_greeting: "Hello! We have a variety of collections available. Which category would you like to explore?"

  router_system: >
    You are an intent classification router for {brand_name}, {brand_description}.
    Classify the user's query into exactly ONE of the following intents:
    {intent_descriptions}

    If the query does not perfectly match one, select the closest fit. If completely unrelated to {brand_name}'s business, default to "search".

  judge_system_product: >
    You are a strict product relevance judge for {brand_name}, {brand_description}.
    The user asked: "{{user_query}}"

    The product search tool returned the following JSON:
    {{product_search_result}}

    Decide if these products genuinely match what the user requested.
    Rules:
    - If the results are completely unrelated product categories -> REJECT.
    - If the JSON is empty [] -> ACCEPT. This is a valid response meaning we do not carry the requested product.
    - If the results are reasonably relevant to the user's query -> ACCEPT.

    Output ONLY one of:
    - "VALID" if the results match (or if the JSON is empty [])
    - A short feedback sentence if they do not (e.g. "Results are the wrong category. Tell user we don't carry those.")

  judge_system_qa: >
    You are a lenient QA evaluator for {brand_name}.
    The user asked: "{{user_query}}"
    The agent responded: "{{last_ai_content}}"

    Output ONLY "VALID" unless the response has one of these CRITICAL failures:
    - The agent made up information not supported by any tool (hallucinated)
    - The agent said it doesn't know, but the response actually contains the answer
    - The agent gave the WRONG product (completely wrong product name)
    - The response is completely empty or a server error message

    DO NOT reject for minor phrasing preferences.
    DO NOT reject policy, FAQ, or product detail answers that contain the relevant facts.
    If in doubt, output "VALID".

intents:
  search:
    description: >
      - "search" : Browsing, finding, recommending, or filtering products by budget/rating/type.
    tools:
      - "SearchProductsDatabase"
  detail:
    description: >
      - "detail" : Asking for specific specs (dimensions, warranty, material, features) of a product, OR asking a follow-up question (like "warranty", "price") about a product recently mentioned in the conversation context.
    tools:
      - "ProductDetailsDatabase"
  policy:
    description: >
      - "policy" : Questions about discounts, offers, deals, coupon codes, shipping, delivery, returns, general warranty claims procedure, or bulk pricing.
    tools:
      - "PolicyVectorDatabase"
      - "ProductDetailsDatabase"
      - "GeneralKnowledgeDatabase"
      - "SearchProductsDatabase"
  advice:
    description: >
      - "advice" : Questions about installation, durability, or maintenance (NO named product).
    tools:
      - "ProductAdviceDatabase"
      - "GeneralKnowledgeDatabase"
      - "SearchProductsDatabase"
  knowledge:
    description: >
      - "knowledge" : Educational concepts, comparisons, or general buying guides.
    tools:
      - "GeneralKnowledgeDatabase"
      - "ProductAdviceDatabase"
      - "SearchProductsDatabase"

search_heuristics:
  stop_words:
    # Generic English stop words only — domain-specific terms go in the domain config.
    - "the"
    - "a"
    - "an"
    - "and"
    - "or"
    - "for"
    - "of"
    - "in"
    - "with"
    - "by"
    - "from"
    - "offers"
    - "offer"
    - "discount"
    - "discounts"
    - "sale"
    - "deal"
    - "deals"
    - "best"
    - "top"
    - "cheap"
    - "cheapest"
    - "buy"
    - "show"
    - "me"
    - "any"
    - "on"
    - "product"
    - "products"
  detail_stop_words:
    - "the"
    - "a"
    - "an"
    - "and"
    - "or"
    - "for"
    - "of"
    - "in"
    - "with"
    - "by"
    - "from"
    - "design"

tool_descriptions:
  SearchProductsDatabase: >
    Use this to search the database for products matching the user's intent.
    It searches by name, category, or features.
  ProductDetailsDatabase: >
    Use this when the user asks about ONE specific named product's details:
    warranty, dimensions, material, price, or any other specification.
  PolicyVectorDatabase: >
    Use this for company-wide operational policies:
    shipping, delivery, returns, warranty claims, pricing, ordering processes.
    Do NOT use for product-specific specs or features.
  ProductAdviceDatabase: >
    Use this for general product FAQs, installation guidance, and suitability advice
    NOT tied to a specific named product.
  GeneralKnowledgeDatabase: >
    Use this to search for active offers, discounts, promotions, and coupon codes.
    Also use this for educational, comparison, and 'how-to' questions
    that are NOT about a specific product and NOT a company policy.
